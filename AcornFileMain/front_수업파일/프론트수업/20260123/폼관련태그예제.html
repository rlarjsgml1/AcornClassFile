<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
        fieldset{
            width: 400px;
        }
    </style>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <form action="fo" method="post">
      <h1>회원 정보 입력</h1>
      <fieldset>
        <legend>로그인정보</legend>
        <h5><label for="user-id">아이디</label></h5>
        <input
          type="text"
          id="user-id"
          name="user-id"
          placeholder="아이디를 입력하세요."
        />
        <h5><label for="user-pw">비밀번호</label></h5>
        <input
          type="password"
          id="user-pw"
          name="user-pw"
          placeholder="비밀번호를 입력하세요."
        />
        <input type="submit" value="로그인" />
      </fieldset>
    <br />
      <fieldset>
        <legend>추가 정보</legend>
        <h5>메일주소: <input type="email" placeholder="asdf@naver.com" /></h5>
        <h5>
          메일수신</h5>
          <label for="male">
            <input type="radio" id="male" name="gender" value="m_1" /> 메일수신 동의 
          </label>
          <label for="female">
            <input type="radio" id="female" name="gender" value="m_2" />
            메일수신 거부
          </label>

        <h5>
          연락처:
          <input
            type="phone"
            placeholder="-을 빼고 입력해주세요"
            size="13"
            maxlength="13"
            autocomplete="off"
          />
        </h5>
        <h5>
          생년월일:
          <input
            type="birth"
            size="10"
            maxlength="10"
            placeholder="YYYY-MM_DD"
          />
        </h5>
        <h5>
          취미
          <label for="checkbox1"
            ><input type="checkbox" id="checkbox1" value="c_1" />독서</label
          >
          <label for="checkbox2"
            ><input type="checkbox" id="checkbox2" value="c_2" />음악감상</label
          >
          <label for="checkbox3"
            ><input type="checkbox" id="checkbox3" value="c_3" />운동</label
          >
        </h5>

        <h5>
          <label for="path">가입경로</label>
          <select name="" id="path">
            <option value="">블로그</option>
            <option value="">인스타</option>
            <option value="">지인</option>
          </select>
        </h5>
        <h5>
          메모
          <textarea name="" id="" rows="10" cols="30" placeholder="자유롭게 의견을 남겨주세요."></textarea
          >
        </h5>
      </fieldset>

      <input type="submit" value="제출"/> 
    </form>
  </body>
</html>
