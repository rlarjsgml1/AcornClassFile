<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>블록요소 예</title>
    <style>
        .container{
            border: 1px solid red;
            width: 500px;
            background-color: blanchedalmond;
        }
        h2{text-align: center;}
        p:first-letter{color: red;}
        span{color: blue;}
        .title{background-color: pink;}
        .snow{background-color: yellowgreen;}
        a{ text-decoration: none; color: green;}
        a:hover{background-color: yellowgreen}

    </style>
  </head>
  <body>
    <div class="container">
      <h2><span class="title">[날씨] 내일 아침 쌀쌀</span></h2>
      <p>한낮 포근... 내륙 짙은 안개</p>
      <p>
        오늘은 서해안을 포함해 내륙 곳곳에도 눈이 내리겠습니다. 자세한 날씨는
        기상캐스터 연결해 알아보겠습니다. 전세영 캐스터.[캐스터] 오늘은
        어제보다는 한파가 누그러든 듯합니다. 현재 서울 체감온도 <span class="snow">-3.2도</span>로, 어제
        같은 시각보다 9도가량 높은데요. 그래도 일요일까지는 맹추위가 계속되는
        만큼, 외출 시 보온에 각별한 주의가 필요하겠습니다.
      </p>
      <a href="#">링크가 있는 내용</a>
    </div>
  </body>
</html>
