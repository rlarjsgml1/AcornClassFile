<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>탭버튼 css 예제</title>
    <style>
      input[name="tab-group"] {
        display: none;
      }
      .tab-button {
        display: inline-block;
        font-weight: bold;
        width: 100px;
        padding: 10px 0;
        text-align: center;
        cursor: pointer;
        background-color: #eee;
        border: 1px solid #ccc;
        border-top-left-radius: 10px;
        border-top-right-radius: 10px;
        transition: all 0.3s ease;
      }
      .tab-content {
        border: 5px solid black;
        width: 420px;
        padding: 20px;
        display: none;
        border-top-right-radius: 50px;
        border-bottom-left-radius: 50px;
        opacity: 0;
        transform: scale(0.8) translateY(20px);
        transition: all 0.45s cubic-bezier(0.25, 0.8, 0.25, 1);
        position: absolute;
        pointer-events: none;
        display: block;
        box-shadow: 0 15px 30px rgba(0, 0, 0, 0.25);
      }
      .tab-button:hover {
        color: white;
      }
      /* 체크된 라디오 버튼의 '다음' 라벨 스타일 변경 */
      input#tab1:checked + label,
      input#tab2:checked + label,
      input#tab3:checked + label {
        background-color: black;
        color: white;
        font-weight: bold;
        transform: translateY(-8px);
        /* box-shadow: 0 8px 15px rgba(0, 0, 0, 0.3); */
      }
      /* 체크된 라디오 버튼의 '형제' 중 해당 컨텐츠만 보여준다 */
      #tab1:checked ~ #content1,
      #tab2:checked ~ #content2,
      #tab3:checked ~ #content3 {
        background-color: white;
        display: block;
        opacity: 1;
        transform: scale(1) translateY(0);
        transform: scale(1);
        pointer-events: auto;
        position: relative;
      }
    </style>
  </head>
  <body>
    <div class="tabs">
      <!-- 라디오 버튼 그룹 (동일한 name을 가져야 함) -->
      <input type="radio" name="tab-group" id="tab1" checked />
      <label for="tab1" class="tab-button">Tab One</label>

      <input type="radio" name="tab-group" id="tab2" />
      <label for="tab2" class="tab-button">Tab Two</label>

      <input type="radio" name="tab-group" id="tab3" />
      <label for="tab3" class="tab-button">Tab Three</label>

      <!-- 탭 내용들(라디오 버튼들과 형제 관계여야 함) -->
      <div id="content1" class="tab-content">
        <h3>Design Logic 01</h3>
        <pre>탭 버튼 위로 점프하며 활성하합니다.</pre>
      </div>

      <div id="content2" class="tab-content">
        <h3>Deep Dark 02</h3>
        <pre>강력한 두께 5px의 테두리가 적용됩니다</pre>
      </div>

      <div id="content3" class="tab-content">
        <h3>Animation 03</h3>
        <pre>확대효과와 함께 나타납니다</pre>
      </div>
    </div>
  </body>
</html>
