<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gradient 원형</title>
    <style>
        div{
            width: 500px;
            height: 350px;
            border-radius: 20px;
        }
        .gradation1{
            background: skyblue;
            background: radial-gradient(skyblue, rgb(44, 153, 226), rgb(115, 0, 255));
            /* 타원형으로 안족에서부터 색 순서대로 적용 */
            /* 모양을 지정하지 않으면 타원형으로 */
        }
        .gradation2{
            background: chartreuse;
            background: radial-gradient(green, red, yellow);
            /* circle 원형 */
            /* ellipse 타원 */
        }
        .gradation3{
            background: pink;
            background: radial-gradient(hotpink,rgb(225, 49, 204),skyblue);
        }
    </style>
</head>
<body>
    <div class="gradation1"></div>
    <div class="gradation2"></div>
    <div class="gradation3"></div>
</body>
</html>
