<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <fieldset>
            <legend> 배송 정보</legend>
            <ul>
                <li>
                    
                    <label for="prod">주문 상품</label>
                    <input type="text" id="prod" value="3kg" readonly> 
                    <!-- readonly : 읽기 적용 -->
                </li>
                <li>
                    <label for="user-name">
                        <input type="text" id="user-name" autofocus required>
                        <!-- autofocus 새로고침시 커서의 위치
                            required: 필수 입력 항목 -->
                    </label>
                </li>
                <li>
                    <label for="addr">배송 주소</label>
                    <input type="text" id="addr" required>
                </li>
                <li>
                    <label for="phone">연락처</label>
                    <input type="tel" id="phone" placeholder="하이폰을 빼고 입력하세요">
                </li>
                <li>
                    <label for="d-day">배송일 지정</label>
                    <input type="date" id="d-day"><small>(주문일로 부터 최소 3일 이후)</small>
                </li>
            </ul>
        </fieldset>
        <div>
            <input type="submit" value="주문하기">
            <input type="reset" value="취소하기">

            
        </div>
    </form>
</body>
</html>
