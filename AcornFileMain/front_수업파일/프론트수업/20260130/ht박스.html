<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
        @font-face {
            font-family: 'the wild breath of zelda';
            src: url(fonts/grinched/GrinchedRegular.ttf);
        }
        body{
            background-color: rgb(189, 221, 246);
            font-family: 'the wild breath of zelda';
        }
        h1{
            color: rgb(92, 101, 73);
            font-weight: 100;
            margin: 50px 0;
        }
        section{
            background-color: white;
            border-radius: 5px;
            width: 300px;
            height: 450px;
            box-shadow: rgb(132, 77, 77) 0px 7px 29px 8px ;
            padding: 25px;
            margin: 15px;
            cursor: pointer;
            text-align: center;
        }
        section:hover{
            box-shadow: rgb(113, 112, 112) 8px 54px 55px;
            /* transform: scaleY(1.04); */
            transition: all 0.3s;
            transform-origin: 0 100%; /*회전 중심 x축, y축, z축*/
            transform: translateY(-50px);
        }
    </style>
  </head>
  <body>
    <h1>Hello My Name is kim gun hee <b>club style</b></h1>
    <main>
      <section>
        <h2>아낌e-보금자리론</h2>
        <h3>0.1%p 더 저렴한 금리</h3>
        <aside>
          <span>최대</span><br>
          주택가격 6억원<br>
          <img src="../20260129/images/1.jpg" alt="" width="230px">
        </aside>
      </section>
    </main>
  </body>
</html>
