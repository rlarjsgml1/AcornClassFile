<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        .div1{
            width: 100px;
            height: 100px;
            background-color: purple;
            color: white;
            position: relative;
        }
        .div2{
            width: 100px;
            height: 100px;
            background-color: black;
            color: white;
            position: absolute;
            top: 50px;
            left: 50px;
        }
    </style>
</head>
<body>
    <section>
        <div class="div1">div1
            <div class="div2">div2</div>
        </div>
        
    </section>
</body>
</html>
