<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        section{
            display: flex;
            justify-content: flex-end;
        }
        .div1{
            background-color: black;
            color: white;
            width: 400px;
            height: 500px;position: relative;
        }
        .div2{
            background-color: purple;
            color: white;
            width: 100px;
            height: 100px;
            position: absolute;
            top: 0px;
            left: 300px;
        }
        .div3{
            background-color: purple;
            color: white;
            width: 100px;
            height: 100px;
            position: absolute;
            top: 50px;
        }
    </style>
</head>
<body>
    <section>
        <div class="div1">div1
            <div class="div2">div2</div>
            <div class="div3">div3</div>
        </div>
    </section>
</body>
</html>
