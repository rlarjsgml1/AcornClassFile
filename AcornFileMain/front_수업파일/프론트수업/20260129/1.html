<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    div{
        width: 300px;
    }
    .container{
        display: flex;
        /* flex-direction: column; */
        flex-wrap: wrap;
    }
    .box{
        color: black;
        border: 3px solid blue;
        padding:  30px;
        margin: 5px;
        width: 300px;
        /* height: 250px; */
        flex-shrink: 0;
    }
    .box1{
        width: 300px;
        height: 200px;
        background-color:khaki;
    }
    /* 테블릿 */
    @media (min-width: 768px) {
        .container{
            flex-direction: row;
            flex-wrap: wrap;
        }
        /*.box{
            width: 50%;
        }*/
    }
    /* pc */
    @media (min-width: 1024px) {
        .container{
            flex-wrap: nowrap;
        }
        /*.box{
            width: 30%;
        }*/
    }
</style>
<body>
    <div class="container">
        <div class="box">
            <div class="box1"></div><br>
            상품1
        </div>
        <div class="box">
            <div class="box1"></div><br>
            상품2</div>
        <div class="box">
            <div class="box1"></div><br>
            상품3</div>
    </div>
    
</body>
</html>
