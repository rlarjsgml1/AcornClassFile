<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>반응형 웹</title>
    <style>
        /* 기본 사이즈일 때 */
        body{
            background-color: goldenrod;
        }
        /* 768이하 (테블릿) 일 때 적용 */
        @media screen and (max-width:768px){
            body{
                background-color: brown;
            }
        }
        /* 320이하(모바일)일 때 적용 */
        @media screen and (max-width:320px){
            body{
                background-color: blue;
            }
        }
    </style>
</head>
<body>
    
</body>
</html>
