<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      ul {
        display: flex;
        width: 4000px;
        height: 350px;
        animation: sildeAni 8s ease-out;
      }
      li {
        width: 1000px;
        height: 750px;
      }
      li:nth-child(1) {
        /* 깃허브에 올릴 때 경로 설정 */
        /* images 파일이름.jpg // 안되고 (live sever에는 나옴) 
        ./imges/파일이름.jpg 를 붙여야 된다
        ../imges/파일이름.jpg 
        ../ 상위 폴더 ./현재위치 / 하위폴더  */
        background: url(images/1.jpg);
        background-size: cover;
      }
      li:nth-child(2) {
        background: url(images/2.jpg);
        background-size: cover;
      }
      li:nth-child(3) {
        background: url(images/3.jpg);
        background-size: cover;
      }
      li:nth-child(4) {
        background: url(images/4.jpg);
        background-size: cover;
      }
      @keyframes sildeAni {
        0% {
          transform: translate(0);
        }
        25% {
          transform: translateX(-1000px);
        }
        50% {
          transform: translate(-2000px);
        }
        75% {
          transform: translate(-3000px);
        }
        100% {
          transform: translate(0);
        }
      }
    </style>
  </head>
  <body>
    <section>
      <ul>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
      </ul>
    </section>
  </body>
</html>
