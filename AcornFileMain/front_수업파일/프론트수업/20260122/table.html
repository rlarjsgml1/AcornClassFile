<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>표만들기</title>
  </head>
  <body>
    <table border="1">
      <caption>색깔의 종류</caption>
      <thead> <!-- 머리 -->
        <tr>
            <th>종류</th><th colspan="2" style="background-color: yellowgreen;">밝은 계열</th><th>어두운 계열</th>
        </tr>
      </thead>
      <tbody> <!-- 중간 -->
        <tr>
            <td>1</td><td>빨강</td><td>분홍색</td><td>검정</td>
        </tr>
        <tr>
            <td>2</td><td>파랑</td><td rowspan="2" style="background-color: aquamarine;">하늘색</td><td>남</td>
        </tr>
        <tr>
            <td>3</td><td>노랑</td><td>회</td>
        </tr>
      </tbody>
      <tfoot> <!-- 끝-->
        <tr>
            <td>합계</td><td>3개</td><td>3개</td><td>3개</td>
        </tr>
        </tfoot>
    </table>

    <hr>

    <table border="1">
        <caption>좋아하는 과일</caption>
        <!-- 줄 박스 tr --> <!-- 행 박스 td --> 
        <tr>
            <td>내용1 <img src="images/apple.jpg" alt="" width="30px"></td>
            <td>내용2 <img src="images/banana.jpg" alt="" width="30px"></td>
            <td>내용3 <img src="images/podo.jpg" alt="" width="30px"></td>
        </tr>
    </table>

    <hr>

    <table border="1" >
        <tr>
            <td colspan="4"><b>아이티월 게스트하우스 예약 안내</b></td>
        </tr>
        <tr>
            <td><b>방 이름</b></td><td><b>대상</b></td><td><b>크기</b></td><td><b>가격</b></td>
        </tr>
        <tr>
            <td><b>유채방</b></td><td>여성 도미토리</td><td rowspan="3">4인실</td><td rowspan="4">1인 20,000원</td>
        </tr>
        <tr>
            <td rowspan="2"><b>동백방</b></td><td>남성 도미토리</td>
        </tr>
        <tr>
            <td>가족 1팀</td>
        </tr>
        <tr>
            <td colspan="2"><b>천혜향방</b></td><td>2인실</td>
        </tr>
        <tr>
            <td colspan="4"><b>바깥채 단독 : 전화문의</b>(010-777-5454)</td>
        </tr>
    </table>

    <hr>

    <h3>상품구성</h3>
    <table border="1">
        <caption>실속형&고급형 상품 구성</caption>
        <tr>
            <td><b>용도</b></td><td><b>증량</b></td><td><b>개수</b></td><td><b>가격</b></td>
        </tr>
        <tr>
            <td rowspan="2">실속형</td><td>3kg</td><td>11~16과</td><td>17,000원</td>
        </tr>
        <tr>
            <td>5kg</td><td>18~25과</td><td>25,000원</td>
        </tr>
        <tr>
            <td rowspan="2">고급형</td><td>3kg</td><td>11~16과</td><td>28,000원</td>
        </tr>
        <tr>
            <td>5kg</td><td>18~25과</td><td>47,000원</td>
        </tr>
    </table>
    <!-- 
        table 표 전체를 담는 컨테이너
        caption 표의 제목
        thead 해딩 셀 그룹
        tbody 데이터 셀 그룹
        tfoot 바닥 셀 그룹
        tr 행, 여러개의 td, th 포함
        th제목(해당) 셀 : 두꺼운 글꼴
        td 데이터 셀 (칸)
    -->
  </body>
</html>
